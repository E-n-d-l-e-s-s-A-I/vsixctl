
repos:
-   repo: https://github.com/tekwizely/pre-commit-golang
    # See 'pre-commit help autoupdate'
    rev: v1.0.0-rc.4
    hooks:
    # Formatters
    -   id: go-fmt-repo
        args: [-w]
    # Linters
    -   id: go-vet-repo-mod
    # Tests
    -   id: go-test-repo-mod
        args: [-race]
