version: 2

builds:
  - main: .
    binary: vsixctl
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/E-n-d-l-e-s-s-A-I/vsixctl/cmd.Version={{.Version}}
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: E-n-d-l-e-s-s-A-I
    name: vsixctl
