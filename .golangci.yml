version: "2"

linters:
  default: standard
  enable:
    - errname
    - exhaustive
    - copyloopvar
    - goconst
    - mirror
    - nilerr
    - unparam
    - usestdlibvars
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - os.Remove
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - goconst
      - path: _test\.go
        text: "SA5011"
        linters:
          - staticcheck
      - source: fmt\.Fprint
        linters:
          - errcheck
