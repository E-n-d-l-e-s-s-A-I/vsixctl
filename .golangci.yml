linters:
  default: standard
  enable:
    - errname
    - exhaustive
    - copyloopvar
    - goconst
    - mirror
    - nilerr
    - unparam
    - usestdlibvars

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - goconst
    - path: _test\.go
      text: "SA5011"
